# Common4 protocol: 4 classes shared across all 4 countries (D00/D10/D20/D40).
# Source: 10-class dataset → Target: contiguous 0..3

source_names:
  0: D00
  1: D01
  2: D10
  3: D11
  4: D20
  5: D40
  6: D43
  7: D44
  8: D50
  9: Repair

target_names:
  0: D00
  1: D10
  2: D20
  3: D40

class_map:
  0: 0   # D00  → 0
  2: 1   # D10  → 1
  4: 2   # D20  → 2
  5: 3   # D40  → 3

drop_classes:
  1: D01
  3: D11
  6: D43
  7: D44
  8: D50
  9: Repair
