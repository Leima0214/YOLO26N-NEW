# YOLO26 + Fourier Angle Alignment backbone.
# Keeps ordinary horizontal-box Detect while refining P3/P4/P5 by Fourier-estimated dominant directions.
# Model docs: https://docs.ultralytics.com/models/yolo26
# Task docs: https://docs.ultralytics.com/tasks/detect

nc: 80
end2end: True
reg_max: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, FFAFusionBlock, [512, 7, 32, 0.001, 0.5]] # P3 FAA refinement
  - [-1, 1, Conv, [512, 3, 2]] # 6-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, FFAFusionBlock, [512, 7, 32, 0.001, 0.5]] # P4 FAA refinement
  - [-1, 1, Conv, [1024, 3, 2]] # 9-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5, 3, True]]
  - [-1, 2, C2PSA, [1024]]
  - [-1, 1, FFAFusionBlock, [1024, 7, 32, 0.001, 0.5]] # P5 FAA refinement

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 8], 1, Concat, [1]] # cat FFA-refined backbone P4
  - [-1, 2, C3k2, [512, True]]

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 5], 1, Concat, [1]] # cat FFA-refined backbone P3
  - [-1, 2, C3k2, [256, True]] # P3/8-small

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 16], 1, Concat, [1]] # cat head P4
  - [-1, 2, C3k2, [512, True]] # P4/16-medium

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 13], 1, Concat, [1]] # cat FFA-refined backbone P5
  - [-1, 1, C3k2, [1024, True, 0.5, True]] # P5/32-large

  - [[19, 22, 25], 1, Detect, [nc]]
