# Paper 1 main composite candidate:
# YOLO26n + CPUBoneNano-P2Lite + EMA attention.
# This keeps the P2Lite four-scale Detect path and adds the current strongest
# single module without introducing the SPDConv bottom-up path.

nc: 80
end2end: True
reg_max: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # args: [variant, yolo_channels, in_chans, adapter_depth, use_context_adapter]
  - [-1, 1, CPUBoneP2BackboneYOLO, [nano, [128, 256, 512, 1024], 3, 0, False]] # 0: [P2/4, P3/8, P4/16, P5/32]
  - [0, 1, CPUBoneFeatureIndex, [0]] # 1-P2/4
  - [0, 1, CPUBoneFeatureIndex, [1]] # 2-P3/8
  - [0, 1, CPUBoneFeatureIndex, [2]] # 3-P4/16
  - [0, 1, CPUBoneFeatureIndex, [3]] # 4-P5/32
  - [4, 1, SPPF, [1024, 5, 3, True]] # 5
  - [-1, 2, C2PSA, [1024]] # 6

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 3], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, True]] # 9 (P4/16)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 2], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, True]] # 12 (P3/8)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 1], 1, Concat, [1]]
  - [-1, 2, C3k2, [128, True]] # 15 (P2/4)

  - [-1, 1, Conv, [128, 3, 2]]
  - [[-1, 12], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, True]] # 18 (P3/8)

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 9], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, True]] # 21 (P4/16)

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 1, C3k2, [1024, True, 0.5, True]] # 24 (P5/32)
  - [-1, 1, EMA_attention, [1024]] # 25

  - [[15, 18, 21, 25], 1, Detect, [nc]] # Detect(P2, P3, P4, P5)
